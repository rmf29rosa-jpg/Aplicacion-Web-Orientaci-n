<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GUIDEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            display: flex;
            width: 100%;
            max-width: 950px;
            min-height: 550px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1), 0 20px 50px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* Lado izquierdo */
        .login-left {
            flex: 1;
            background: linear-gradient(145deg, #1e3a5f 0%, #2d4a6f 50%, #1e3a5f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .login-left::before, .login-left::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
        }

        .login-left::before { top: -100px; right: -100px; width: 300px; height: 300px; }
        .login-left::after { bottom: -80px; left: -80px; width: 250px; height: 250px; }

        .login-branding {
            text-align: center;
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-brand-title {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .login-logo {
            width: 190px;
            margin: 1.5rem 0;
            filter: drop-shadow(0 8px 25px rgba(0,0,0,0.25));
            transition: transform 0.3s ease;
        }

        .login-logo:hover { transform: scale(1.03); }

        .login-brand-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.9);
            max-width: 280px;
            margin-top: 0.5rem;
        }

        .login-brand-description {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            max-width: 300px;
            margin-top: 1rem;
        }

        /* Lado derecho */
        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            background: #fff;
        }

        .login-form-container {
            width: 100%;
            max-width: 340px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 2rem;
        }

        .login-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.875rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .login-error::before {
            content: '!';
            width: 22px;
            height: 22px;
            background: #dc2626;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .form-group { margin-bottom: 1.25rem; }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1.125rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1f2937;
            background: #f9fafb;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
        }

        .form-input::placeholder { color: #9ca3af; }

        .btn-login {
            width: 100%;
            padding: 0.9375rem 2rem;
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            box-shadow: 0 4px 14px rgba(37,99,235,0.35);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37,99,235,0.45);
            background: linear-gradient(135deg, #2563eb, #1e40af);
        }

        .btn-login:active { transform: translateY(0); }

        .login-footer {
            margin-top: 2rem;
            text-align: center;
            color: #9ca3af;
            font-size: 0.8rem;
        }

        .login-footer-brand {
            font-weight: 600;
            color: #1e3a5f;
        }

        /* Responsive */
        @media (max-width: 800px) {
            body { padding: 1rem; }
            .login-card { flex-direction: column; min-height: auto; }
            .login-left { padding: 2.5rem 2rem; }
            .login-logo { width: 130px; margin: 1.25rem 0; }
            .login-brand-title { font-size: 2.25rem; }
            .login-brand-subtitle { font-size: 0.9rem; margin-top: 0.75rem; }
            .login-brand-description { font-size: 0.8rem; margin-top: 0.75rem; }
            .login-right { padding: 2rem 1.5rem; }
            .login-form-container { animation: none; }
        }

        @media (max-width: 480px) {
            body { padding: 0.75rem; }
            .login-card { border-radius: 20px; }
            .login-left { padding: 2rem 1.5rem; }
            .login-logo { width: 115px; }
            .login-brand-title { font-size: 2rem; }
            .login-brand-subtitle { font-size: 0.85rem; max-width: 200px; margin-top: 0.5rem; }
            .login-brand-description { font-size: 0.75rem; max-width: 220px; margin-top: 0.5rem; }
            .login-right { padding: 1.5rem 1.25rem; }
            .login-title { font-size: 1.5rem; }
            .form-group { margin-bottom: 1rem; }
            .form-input { padding: 0.75rem 1rem; font-size: 0.9rem; }
            .btn-login { padding: 0.8125rem 1.5rem; }
        }

        /* Modo oscuro */
        @media (prefers-color-scheme: dark) {
            body { background: #0f172a; }
            .login-card { background: #1e293b; }
            .login-left { background: linear-gradient(145deg, #0f172a, #1e293b 50%, #0f172a); }
            .login-title { color: #f1f5f9; }
            .login-subtitle { color: #94a3b8; }
            .form-label { color: #e2e8f0; }
            .form-input { background: #0f172a; border-color: #334155; color: #f1f5f9; }
            .form-input:focus { border-color: #3b82f6; }
            .form-input::placeholder { color: #64748b; }
            .login-footer { color: #64748b; }
            .login-footer-brand { color: #60a5fa; }
            .login-error { background: rgba(220,38,38,0.15); border-color: rgba(220,38,38,0.3); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-left">
            <div class="login-branding">
                <h1 class="login-brand-title">GUIDEX</h1>
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="GUIDEX Logo" class="login-logo">
                <p class="login-brand-subtitle">Sistema de Gestión Orientación & Psicología</p>
                <p class="login-brand-description">Plataforma para la gestión integral de orientación y bienestar estudiantil</p>
            </div>
        </div>
        
        <div class="login-right">
            <div class="login-form-container">
                <h2 class="login-title">Bienvenido</h2>
                <p class="login-subtitle">Inicia sesión en tu cuenta GUIDEX</p>
                
                {% if error %}
                <div class="login-error">{{ error }}</div>
                {% endif %}
                
                <form method="POST">
                    <div class="form-group">
                        <label for="correo" class="form-label">Correo Electrónico</label>
                        <input type="email" id="correo" name="correo" class="form-input" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-login">
                        <span>Iniciar Sesión</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                    </button>
                </form>
                
                <div class="login-footer">
                    <span class="login-footer-brand">GUIDEX</span> — Sistema de Gestión Orientación & Psicología
                </div>
            </div>
        </div>
    </div>
</body>
</html>
